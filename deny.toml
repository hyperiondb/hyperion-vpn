[advisories]
version = 2
yanked = "deny"
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "paste is unmaintained but not vulnerable; pulled in transitively by tun-rs via netlink-packet-core, no drop-in replacement upstream yet" },
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "GPL-3.0-or-later",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
