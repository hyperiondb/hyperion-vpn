listen = "0.0.0.0:8443"

[key]
source = "env"
env_var = "HYPERION_PSK"

[identity]
static_key_file = "/etc/hyperion/server.key"
admin_pubkeys = [
    "BASE64_ADMIN_STATIC_PUBKEY",
]

[knock]
enabled = true
window_secs = 30

[firewall]
table = "hyperion"
set = "knock_allow"
ttl_secs = 60

[egress]
allow = [22, 5432]

[limits]
handshake_timeout_ms = 3000
